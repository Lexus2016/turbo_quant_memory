<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Turbo Quant Memory для AI-агентов</title>
  <desc id="desc">Титульный баннер, объясняющий, что Turbo Quant Memory является читаемым слоем памяти для AI-агентов разработки с понятными режимами project, hybrid и global.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b2840"/>
      <stop offset="100%" stop-color="#0d4d63"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#153958"/>
      <stop offset="100%" stop-color="#10283c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 72px 'Segoe UI', Arial, sans-serif; fill: #f7fbff; }
      .subtitle { font: 600 33px 'Segoe UI', Arial, sans-serif; fill: #9fe9ff; }
      .body { font: 400 28px 'Segoe UI', Arial, sans-serif; fill: #d6e7f2; }
      .kicker { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #ecfbff; }
      .eyebrow { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #96e4ff; letter-spacing: 1.2px; text-transform: uppercase; }
      .chip { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #eefaff; }
      .footer { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #d9e6ef; }
      .panelHeading { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #9fe9ff; letter-spacing: 1px; text-transform: uppercase; }
      .badgeLabel { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #d9fbff; letter-spacing: 0.8px; }
      .cardTitle { font: 700 29px 'Segoe UI', Arial, sans-serif; fill: #f7fbff; }
      .cardText { font: 400 19px 'Segoe UI', Arial, sans-serif; fill: #d4e6f1; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1338" cy="152" r="190" fill="#1ee3cf" opacity="0.12" filter="url(#glow)"/>
  <circle cx="220" cy="760" r="220" fill="#46b8ff" opacity="0.11" filter="url(#glow)"/>
  <circle cx="1462" cy="756" r="118" fill="#97ffbe" opacity="0.10" filter="url(#glow)"/>

  <rect x="74" y="58" rx="42" ry="42" width="760" height="784" fill="#0a1828" opacity="0.18"/>
  <rect x="96" y="84" rx="28" ry="28" width="454" height="58" fill="#12344a" stroke="#25506a" stroke-opacity="0.8"/>
  <text x="126" y="121" class="kicker">Память становится частью инфраструктуры</text>

  <text x="110" y="232" class="eyebrow">Для ежедневной работы с AI</text>
  <text x="110" y="330" class="title">Turbo Quant Memory</text>
  <text x="110" y="390" class="subtitle">Слой памяти для AI-агентов разработки</text>

  <text x="110" y="480" class="body">
    <tspan x="110" dy="0">Не собирайте контекст заново в каждой сессии.</tspan>
    <tspan x="110" dy="42">Держите знания проекта рядом, сначала</tspan>
    <tspan x="110" dy="42">возвращайте нужный фрагмент, а больший</tspan>
    <tspan x="110" dy="42">контекст открывайте только по необходимости.</tspan>
  </text>

  <rect x="110" y="644" rx="22" ry="22" width="258" height="62" fill="#12334a" stroke="#25506a" stroke-opacity="0.75"/>
  <rect x="386" y="644" rx="22" ry="22" width="396" height="62" fill="#12334a" stroke="#25506a" stroke-opacity="0.75"/>
  <rect x="110" y="722" rx="22" ry="22" width="338" height="62" fill="#12334a" stroke="#25506a" stroke-opacity="0.75"/>
  <text x="239" y="684" class="chip" text-anchor="middle">Память проекта</text>
  <text x="584" y="684" class="chip" text-anchor="middle">Меньше контекста по умолчанию</text>
  <text x="279" y="762" class="chip" text-anchor="middle">Полный контекст по запросу</text>

  <text x="110" y="816" class="footer">Claude Code  •  Codex  •  Cursor  •  OpenCode  •  MCP-клиенты</text>

  <rect x="900" y="96" rx="36" ry="36" width="560" height="708" fill="url(#panel)" opacity="0.96" stroke="#234f6d" stroke-opacity="0.75"/>
  <text x="940" y="152" class="panelHeading">Три режима памяти</text>

  <rect x="940" y="186" rx="30" ry="30" width="480" height="156" fill="#123a54" stroke="#2a5f79" stroke-opacity="0.9"/>
  <rect x="940" y="376" rx="30" ry="30" width="480" height="156" fill="#14425b" stroke="#2b6480" stroke-opacity="0.9"/>
  <rect x="940" y="566" rx="30" ry="30" width="480" height="156" fill="#175069" stroke="#2d6a84" stroke-opacity="0.9"/>

  <rect x="970" y="214" rx="18" ry="18" width="140" height="38" fill="#0d3144" stroke="#56d6ff" stroke-opacity="0.7"/>
  <text x="1040" y="239" class="badgeLabel" text-anchor="middle">ПРОЕКТ</text>
  <text x="970" y="289" class="cardTitle">Память проекта</text>
  <text x="970" y="319" class="cardText">
    <tspan x="970" dy="0">Решения, уроки, передачи</tspan>
    <tspan x="970" dy="23">контекста и паттерны.</tspan>
  </text>

  <rect x="970" y="404" rx="18" ry="18" width="140" height="38" fill="#0d3144" stroke="#7ce1ff" stroke-opacity="0.7"/>
  <text x="1040" y="429" class="badgeLabel" text-anchor="middle">ГИБРИД</text>
  <text x="970" y="469" class="cardTitle">
    <tspan x="970" dy="0">Сначала компактный</tspan>
    <tspan x="970" dy="33">retrieval</tspan>
  </text>
  <text x="970" y="521" class="cardText">
    <tspan x="970" dy="0">Ищите кратко. Открывайте больше</tspan>
    <tspan x="970" dy="23">только по необходимости.</tspan>
  </text>

  <rect x="970" y="594" rx="18" ry="18" width="140" height="38" fill="#0d3144" stroke="#8bffb0" stroke-opacity="0.7"/>
  <text x="1040" y="619" class="badgeLabel" text-anchor="middle">ГЛОБАЛ</text>
  <text x="970" y="669" class="cardTitle">Переиспользуемые знания</text>
  <text x="970" y="699" class="cardText">
    <tspan x="970" dy="0">Продвигайте то, что должна</tspan>
    <tspan x="970" dy="23">помнить вся команда.</tspan>
  </text>
</svg>

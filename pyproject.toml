[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "turbo-memory-mcp"
version = "0.2.2"
description = "Local-first stdio MCP server for Turbo Quant Memory for AI Agents."
readme = "TECHNICAL_SPEC.md"
requires-python = ">=3.11"
dependencies = [
  "lancedb>=0.30.1,<0.31",
  "markdown-it-py>=4.0.0,<5.0",
  "mcp>=1.12.4,<2.0",
  "sentence-transformers>=5.3.0,<6.0",
]

[project.scripts]
turbo-memory-mcp = "turbo_memory_mcp.cli:main"

[dependency-groups]
dev = [
  "pytest>=8.3.0,<9.0",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

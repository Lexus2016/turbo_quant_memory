# Launch Codex in the target repository, use `codex -C <repo-root> ...`,
# or set `TQMEMORY_PROJECT_ROOT` explicitly if the MCP process starts elsewhere.
# The repository path is resolved from the process working directory, not from `args`.
# Expected user install path: `uv tool install git+https://github.com/Lexus2016/turbo_quant_memory@v0.3.1`
# or `python -m pip install git+https://github.com/Lexus2016/turbo_quant_memory@v0.3.1`.
# Optional value tracking: set `TQMEMORY_INPUT_COST_PER_1M_TOKENS_USD` in `env`.
[mcp_servers.tqmemory]
command = "turbo-memory-mcp"
args = ["serve"]
startup_timeout_sec = 60.0
tool_timeout_sec = 60.0
env = {}
